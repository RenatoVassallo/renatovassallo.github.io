[params]
  math = true
  env = "production"
  ShowReadingTime = true
  defaultTheme = "light"
  disableThemeToggle = true

  [params.profileMode]
  enabled = true
  title = "Renato Vassallo"
  subtitle = """I am an economist at the Institute for Economic Analysis (IAE-CSIC) and an MRes student in the International Doctorate in Economic Analysis (IDEA) program. My work uses econometrics and machine learning to study economic dynamics and inform policy discussions."""
    imageUrl = "images/photo_bse.png"  # relative to /static
    imageTitle = "Renato Vassallo"
    imageWidth = 150

    [[params.profileMode.buttons]]
      name = "Email"
      url = "mailto:renato.vassallo@bse.eu"
      icon = "email"

    [[params.profileMode.buttons]]
      name = "GitHub"
      url = "https://github.com/renatovassallo"
      icon = "github"

    [[params.profileMode.buttons]]
      name = "LinkedIn"
      url = "https://linkedin.com/in/renatovassallo"
      icon = "linkedin"

  [params.academic]
    sidebarBio = ["Economics", "Econometrics", "Machine Learning"]


