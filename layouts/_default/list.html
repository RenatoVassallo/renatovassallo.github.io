{{ define "main" }}
<div class="container">
  <div class="page">
    <header class="section-head">
      {{- if .Title }}<h1 class="section-head__title">{{ .Title }}</h1>{{ end }}
      {{ partial "fan-divider.html" . }}
      {{- with .Description }}<p class="hero__tagline" style="margin-top:var(--space-4);">{{ . }}</p>{{ end }}
    </header>
    {{- with .Content }}
    <div class="prose rich-text">{{ . }}</div>
    {{- end }}
    {{- with .Pages }}
    <ul class="site-footer__links" style="margin-top:var(--space-6);">
      {{- range . }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{- end }}
    </ul>
    {{- end }}
  </div>
</div>
{{ end }}
