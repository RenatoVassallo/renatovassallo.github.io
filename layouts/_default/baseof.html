<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode | default "en" }}" dir="ltr">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {{- partial "header.html" . -}}
  <main id="main">
    {{- block "main" . }}{{ end -}}
  </main>
  {{- partial "footer.html" . -}}
  {{- $js := resources.Get "js/main.js" | minify | fingerprint -}}
  <script defer src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
</body>
</html>
