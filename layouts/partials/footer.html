<footer class="site-footer">
  <div class="container site-footer__inner">
    <div>
      <a class="brand" href="{{ "/" | relURL }}" aria-label="{{ site.Title }}, home">
        <span class="brand__mark" aria-hidden="true">RV</span>
        <span class="brand__name">{{ site.Title }}</span>
      </a>
      <p class="site-footer__bio">{{ site.Params.footerBio | default site.Params.description }}</p>
    </div>
    <div>
      <p class="site-footer__title">Navigate</p>
      <ul class="site-footer__links">
        {{- range site.Menus.main }}
        <li><a href="{{ .URL | relLangURL }}">{{ .Name }}</a></li>
        {{- end }}
      </ul>
    </div>
    <div>
      <p class="site-footer__title">Elsewhere</p>
      {{- partial "social.html" . -}}
    </div>
    <div class="site-footer__legal">
      {{ with site.Copyright }}{{ . | safeHTML }}{{ else }}&copy; {{ now.Year }} {{ site.Title }}{{ end }}
    </div>
  </div>
</footer>
